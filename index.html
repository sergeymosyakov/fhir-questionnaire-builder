<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logic Builder</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="top-panel">
  <span class="top-panel-title">Logic Builder</span>
  <div class="top-panel-sep"></div>

  <!-- Patient.birthDate → age -->
  <label>Age
    <input type="number" id="inp-age" value="30" min="0" max="120" style="width:60px">
  </label>

  <!-- Patient.gender -->
  <label>Gender
    <select id="inp-gender" class="top-sel">
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
      <option value="unknown">Unknown</option>
    </select>
  </label>

  <!-- Observation: body-mass-index -->
  <label>BMI
    <input type="number" id="inp-bmi" value="42" min="0" max="100" style="width:60px">
  </label>

  <div class="top-panel-sep"></div>

  <!-- Observation: pregnancy-status (extension) -->
  <label class="top-check"><input type="checkbox" id="inp-pregnant"> Pregnant</label>

  <!-- Observation: tobacco-use -->
  <label class="top-check"><input type="checkbox" id="inp-smoker"> Smoker</label>

  <div class="top-panel-sep"></div>

  <!-- Claim.procedure.procedureCodeableConcept -->
  <label>Procedure code
    <input type="text" id="inp-proc" value="43644" style="width:90px">
  </label>

  <!-- Condition codes / display (comma-separated) -->
  <label>Comorbidities
    <input type="text" id="inp-comorb" placeholder="diabetes, hypertension" style="width:160px">
  </label>

  <button id="testBtn" class="btn-test">Test</button>
  <a href="https://github.com/sergeymosyakov/fhir-questionnaire-builder" target="_blank" rel="noopener" class="top-github-link" title="View source on GitHub"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>
</div>

<div class="layout">
  <div class="left-panel">
    <div class="left-panel-header">
      <span class="section-title">Logic Builder</span>
      <div class="tree-toolbar">
        <button id="addRootGroupBtn" type="button" class="btn-add-root">+ Add Root Group</button>
        <button id="collapseAllBtn" type="button" class="btn-icon-ctrl" title="Collapse all">&#x229F;</button>
        <button id="expandAllBtn"   type="button" class="btn-icon-ctrl" title="Expand all">&#x229E;</button>
        <span class="tree-toolbar-sep"></span>
        <select id="renumberFormat" class="btn-tree-ctrl">
          <option value="numbers">1 · 2 · 3</option>
          <option value="roman">I · II · III</option>
          <option value="letters">A · B · C</option>
        </select>
        <button id="renumberBtn" type="button" class="btn-tree-ctrl">&#x21BA; Renumber</button>
      </div>
    </div>
    <div class="left-panel-body">
      <div id="treeContainer"></div>
    </div>
  </div>
  <div class="right-panel">
    <div class="right-panel-header">
      <div class="right-panel-header-top">
        <span class="section-title">Questionnaire Preview</span>
        <span class="preview-copyright">&copy; 2026 <a href="https://github.com/sergeymosyakov" target="_blank" rel="noopener">Sergey Mosyakov</a> &middot; Free to use with attribution</span>
      </div>
      <div class="final-result" id="finalResult"></div>
      <div class="fhir-toolbar">
        <button id="loadFhirBtn" type="button" class="btn-fhir">&#x2B06; Load</button>
        <input type="file" id="fhirFileInput" accept=".json,application/json" style="display:none">
        <button id="exportFhirBtn" type="button" class="btn-fhir btn-fhir-export">&#x2B07; Export</button>
        <span class="fhir-toolbar-sep"></span>
        <button id="previewCollapseAllBtn" type="button" class="btn-fhir" title="Collapse all sections" style="display:none">&#x229F;</button>
        <button id="previewExpandAllBtn" type="button" class="btn-fhir" title="Expand all sections" style="display:none">&#x229E;</button>
        <button id="loadExampleBtn" type="button" class="btn-fhir">&#x2605; Example</button>
      </div>
    </div>
    <div class="right-panel-body">
      <div class="preview-card" id="lform"></div>
    </div>
  </div>
</div>

<script src="lib/fhirpath.min.js"></script>
<script src="lib/fhirpath.r4.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
