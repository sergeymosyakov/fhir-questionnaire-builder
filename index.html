<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logic Builder</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="top-panel">
  <span class="top-panel-title">Logic Builder</span>
  <div class="top-panel-sep"></div>

  <!-- Patient.birthDate → age -->
  <label>Age
    <input type="number" id="inp-age" value="30" min="0" max="120" style="width:60px">
  </label>

  <!-- Patient.gender -->
  <label>Gender
    <select id="inp-gender" class="top-sel">
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
      <option value="unknown">Unknown</option>
    </select>
  </label>

  <!-- Observation: body-mass-index -->
  <label>BMI
    <input type="number" id="inp-bmi" value="42" min="0" max="100" style="width:60px">
  </label>

  <div class="top-panel-sep"></div>

  <!-- Observation: pregnancy-status (extension) -->
  <label class="top-check"><input type="checkbox" id="inp-pregnant"> Pregnant</label>

  <!-- Observation: tobacco-use -->
  <label class="top-check"><input type="checkbox" id="inp-smoker"> Smoker</label>

  <div class="top-panel-sep"></div>

  <!-- Claim.procedure.procedureCodeableConcept -->
  <label>Procedure code
    <input type="text" id="inp-proc" value="43644" style="width:90px">
  </label>

  <!-- Condition codes / display (comma-separated) -->
  <label>Comorbidities
    <input type="text" id="inp-comorb" placeholder="diabetes, hypertension" style="width:160px">
  </label>

  <button id="testBtn" class="btn-test">Test</button>
</div>

<div class="layout">
  <div class="left-panel">
    <span class="section-title">Logic Builder</span>
    <div class="fhir-toolbar">
      <button id="loadFhirBtn" type="button" class="btn-fhir">&#x2B06; Load FHIR JSON</button>
      <input type="file" id="fhirFileInput" accept=".json,application/json" style="display:none">
      <button id="loadExampleBtn" type="button" class="btn-fhir">&#x2605; Example</button>
      <button id="exportFhirBtn" type="button" class="btn-fhir btn-fhir-export">&#x2B07; Export</button>
    </div>
    <div class="tree-toolbar">
      <button id="addRootGroupBtn" type="button" class="btn-add-root">+ Add Root Group</button>
      <button id="collapseAllBtn" type="button" class="btn-tree-ctrl">&#x25B6; Collapse all</button>
    </div>
    <div id="treeContainer"></div>
  </div>
  <div class="right-panel">
    <span class="section-title">Questionnaire Preview</span>
    <div class="preview-card" id="lform"></div>
    <div class="final-result" id="finalResult"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
