<div id="progressWrap" class="progress-wrap" data-mount="progress-wrap">
  <div id="progressBar" class="progress-bar" data-mount="progress-bar"></div>
  <span id="progressLabel" class="progress-label" data-mount="progress-label"></span>
</div>
<div id="uiBlocker" class="ui-blocker" data-mount="ui-blocker"></div>

<div class="top-panel">
  <span class="top-panel-title">Logic Builder</span>
  <div class="top-panel-sep"></div>

  <div class="load-wrap" id="patientPresetWrap" data-mount="patient-preset">
    <button type="button" id="patientPresetBtn" data-testid="patient-preset-btn" class="btn-fhir"
      data-tip-title="Patient Preset"
      data-tip-body="Select a patient profile to populate %age, %gender, %bmi, %pregnant, %smoker, %proc, %comorb variables. Applying a preset re-evaluates all initialExpression fields. Use Custom… to edit values manually."
      data-tip-spec="SDC &#xB7; questionnaire-level variable">&#x1F464; Patient &#x25BE;</button>
    <div class="load-menu" id="patientPresetMenu" style="display:none">
      <div class="load-menu-item" data-preset="adult-male">Adult Male (35 &middot; BMI&thinsp;24)</div>
      <div class="load-menu-item" data-preset="adult-female">Adult Female (28 &middot; BMI&thinsp;22)</div>
      <div class="load-menu-item" data-preset="obese-male">Obese Male (45 &middot; BMI&thinsp;38 &middot; smoker)</div>
      <div class="load-menu-item" data-preset="child">Child (10 &middot; BMI&thinsp;16)</div>
      <div class="load-menu-item" data-preset="pregnant-female">Pregnant Female (30 &middot; BMI&thinsp;26)</div>
      <div class="load-menu-sep"></div>
      <div class="load-menu-item" data-preset="custom">&#x270F; Custom&hellip;</div>
    </div>
  </div>

<div class="layout" id="mainLayout">
  <div class="left-panel" data-mount="left-panel">
    <div class="left-panel-header">
      <div class="left-panel-title-row">
        <span class="section-title">Logic Builder<span id="tooltipsOffBadge" class="tips-off-badge" style="display:none">tooltips off</span></span>
        <span id="fhirVersionSelectMount" class="fhir-version-select-mount" data-mount="fhir-version-select"
          data-tip-title="FHIR Target Version"
          data-tip-body="Select the FHIR version this questionnaire targets. Affects which item types and fields are available in the builder, and is recorded in a builder-target-version extension on export (FHIR's Meta type has no fhirVersion field)."
          data-tip-fhir="Questionnaire.extension[builder-target-version]"
          data-tip-spec="R4 · R4B · R5"></span>
        <span class="left-panel-header-right" data-mount="left-header-right"></span>
      </div>
      <div class="tree-toolbar">
        <button id="addRootGroupBtn" type="button" class="btn-add-root" data-testid="add-root-group-btn" data-mount="add-root-group-btn"
          data-tip-title="Add Root Group"
          data-tip-body="Creates a new top-level group at the end of the questionnaire. Groups can contain items and other nested groups."
          data-tip-fhir="Questionnaire.item[type=group]"
          data-tip-spec="R4 · required">+ Add Root Group</button>
        <span class="tree-toolbar-sep"></span>
        <span id="renumberFormatWrap" class="renumber-format-wrap" data-mount="renumber-wrap"></span>
        <button id="renumberBtn" type="button" class="btn-tree-ctrl" data-mount="renumber-btn"
          data-testid="renumber-btn"
          data-tip-title="Renumber"
          data-tip-body="Assigns sequential prefix values (e.g. 1, 1.1, 1.2) to every item based on the selected format. Writes to item.prefix only — linkId is never changed."
          data-tip-fhir="Questionnaire.item.prefix"
          data-tip-spec="R4 · optional">&#x21BA; Renumber</button>
      </div>
    </div>
    <!-- Questionnaire metadata card (mount point for js/ui/metadata-card.js) -->
    <div id="questMetaCardMount" data-mount="metadata-card"></div>
    <!-- Questionnaire-level SDC variables card (mount point for js/ui/variables-panel.js) -->
    <div id="variablesCardMount" data-mount="variables-panel"></div>
    <div class="left-panel-body" data-mount="left-panel-body">
      <div id="treeContainer" data-testid="tree-container" data-mount="tree-container"></div>
    </div>
  </div>
  <div class="panel-resizer" id="panelResizer" data-mount="panel-resizer"></div>
  <div class="right-panel">
    <div class="right-panel-header">
      <div class="right-panel-header-top">
        <span class="section-title" data-mount="file-name">
          <span tabindex="-1" data-testid="preview-panel-title">Questionnaire Preview</span>
        </span>
        <span id="headerActions" class="preview-header-actions" data-mount="header-actions"></span>
      </div>
      <div class="fhir-toolbar">
        <div class="search-wrap" id="searchWrap" style="display:none" data-mount="search-wrap">
          <input type="search" id="searchInput" class="search-input" data-mount="search-input" placeholder="&#x1F50D; Search&hellip;" autocomplete="off" data-testid="preview-search-input">
          <button id="searchPrevBtn" type="button" class="search-nav-btn" data-mount="search-prev-btn" data-tip-title="Previous match" data-tip-body="Jump to the previous search result. Keyboard shortcut: ↑ while search is focused.">&#x2191;</button>
          <button id="searchNextBtn" type="button" class="search-nav-btn" data-mount="search-next-btn" data-tip-title="Next match" data-tip-body="Jump to the next search result. Keyboard shortcut: ↓ or Enter while search is focused.">&#x2193;</button>
          <span id="searchCounter" class="search-counter" data-mount="search-counter"></span>
        </div>
        <span class="fhir-toolbar-sep"></span>
        <span id="statusBadgeWrap" class="status-badge-wrap" style="display:none" data-mount="status-badge-wrap">
          <button id="statusBadgeBtn" type="button" class="status-badge" data-testid="status-badge-btn" data-mount="status-badge-btn"></button>
          <div id="statusDropdown" class="status-dropdown" style="display:none" data-mount="status-dropdown"></div>
        </span>
        <span id="langSwitcherWrap" class="lang-switcher-wrap" data-mount="lang-switcher-wrap" data-testid="lang-switcher-wrap"></span>
      </div>
    </div>
    <div class="right-panel-body">
      <div class="preview-card" id="lform" data-testid="preview-panel" data-mount="preview-lform"></div>
      <pre id="fhirJsonView" class="fhir-json-view" style="display:none" data-mount="fhir-json-view"></pre>
    </div>
  </div>
</div>

<noscript>
  <main class="noscript-main">
    <h1>FHIR Questionnaire Logic Builder</h1>
    <p>
      A free, open-source visual builder for <strong>FHIR R4 Questionnaires</strong>.
      Build complex clinical questionnaires with drag-and-drop, then export valid FHIR JSON —
      no server required.
    </p>
    <h2>Key features</h2>
    <ul>
      <li>Drag-and-drop item tree — groups, items, nested structures</li>
      <li>Conditional logic — <code>enableWhen</code> and <code>enableWhenExpression</code> (FHIRPath)</li>
      <li>SDC variables — <code>sdc-questionnaire-variable</code> at questionnaire level</li>
      <li>Calculated expressions — <code>calculatedExpression</code> with live FHIRPath evaluation</li>
      <li>Patient presets — seed <code>%age</code>, <code>%gender</code>, <code>%bmi</code> and more</li>
      <li>Answer types — text, integer, decimal, date, boolean, radio, select, open-choice, reference, quantity</li>
      <li>FHIR JSON import and export — round-trip safe for all supported extensions</li>
      <li>QuestionnaireResponse import and export</li>
      <li>Display category — <code>questionnaire-displayCategory</code> (instructions / security / help)</li>
      <li>Choice orientation — <code>questionnaire-choiceOrientation</code> (vertical / horizontal)</li>
      <li>Entry format placeholders — <code>sdc-questionnaire-entryFormat</code></li>
      <li>Slider controls — <code>questionnaire-sliderStepValue</code></li>
      <li>Constraint validation — <code>questionnaire-constraint</code> with FHIRPath</li>
      <li>Patient View — clean form preview without builder annotations</li>
    </ul>
    <p>
      Built with vanilla JavaScript and <strong>fhirpath.js</strong>. No framework, no bundler, no backend.
      Source on <a href="https://github.com/sergeymosyakov/fhir-questionnaire-builder">GitHub</a>.
    </p>
  </main>
</noscript>
