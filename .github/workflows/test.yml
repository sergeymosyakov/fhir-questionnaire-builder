name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=verbose --reporter=github-actions

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      # Upload the HTML report even when tests fail so it can be deployed / inspected.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      # Upload test-results (screenshots + videos) on failure.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # Deploy app + test report to GitHub Pages.
  # Requires: Settings → Pages → Source = "GitHub Actions".
  deploy:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      # Download the HTML report generated by the e2e job.
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      # Assemble _site/: app files at root, Playwright report at /playwright-report/.
      - name: Prepare site
        run: |
          mkdir -p _site/playwright-report
          rsync -a \
            --exclude=_site \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=test-results \
            --exclude=playwright-report \
            . _site/
          cp -r playwright-report/. _site/playwright-report/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
      - id: deployment
        uses: actions/deploy-pages@v4
