  // ── Category badge colors ─────────────────────────────────────────────────
  const CAT_CLASS = {
    'Questionnaire':     'cat-quest',
    'Item — Core':       'cat-core',
    'Item — Extensions': 'cat-ext',
    'Item — SDC':        'cat-sdc',
    'QR Export':         'cat-qr',
    'Not Supported':     'cat-ns',
  };

  // ── Render table ──────────────────────────────────────────────────────────
  const tbody = document.getElementById('helpBody');
  let lastCat = null;

  function renderRows(data) {
    tbody.innerHTML = '';
    lastCat = null;
    let count = 0;
    data.forEach(row => {
      if (row.cat !== lastCat) {
        const sep = document.createElement('tr');
        sep.className = 'help-cat-sep';
        sep.innerHTML = `<td colspan="4"><span class="help-cat-badge ${CAT_CLASS[row.cat] || ''}">${row.cat}</span></td>`;
        tbody.appendChild(sep);
        lastCat = row.cat;
      }
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td class="col-field"><code>${escHtml(row.field)}</code></td>` +
        `<td class="col-desc">${escHtml(row.desc)}</td>` +
        `<td class="col-where">${escHtml(row.where)}</td>` +
        `<td class="col-how">${escHtml(row.how)}</td>`;
      tbody.appendChild(tr);
      count++;
    });
    return count;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Search ────────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('helpSearch');
  const helpEmpty   = document.getElementById('helpEmpty');
  const helpCount   = document.getElementById('helpCount');
  const table       = document.getElementById('helpTable');

  function update(query) {
    const q = query.trim().toLowerCase();
    const filtered = q
      ? HELP_DATA.filter(r =>
          r.field.toLowerCase().includes(q) ||
          r.desc.toLowerCase().includes(q) ||
          r.where.toLowerCase().includes(q) ||
          r.how.toLowerCase().includes(q) ||
          r.cat.toLowerCase().includes(q))
      : HELP_DATA;

    const count = renderRows(filtered);
    helpEmpty.style.display = count === 0 ? 'block' : 'none';
    table.style.display     = count === 0 ? 'none'  : '';
    helpCount.textContent   = q ? `${count} of ${HELP_DATA.length} fields` : `${HELP_DATA.length} fields`;
  }

  searchInput.addEventListener('input', () => update(searchInput.value));
  update('');
  </script>
</body>
</html>
